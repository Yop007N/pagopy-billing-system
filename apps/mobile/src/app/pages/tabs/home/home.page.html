<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>PagoPy - Dashboard</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <div class="content-wrapper">
    <!-- Quick Actions -->
    <ion-card class="action-card">
      <ion-card-content>
        <ion-button expand="block" size="large" (click)="goToNewSale()">
          <ion-icon name="add-outline" slot="start"></ion-icon>
          Nueva Venta
        </ion-button>
      </ion-card-content>
    </ion-card>

    <!-- Stats Grid -->
    <ion-grid>
      <ion-row>
        <ion-col size="6">
          <ion-card class="stat-card">
            <ion-card-header>
              <ion-icon name="cash-outline" color="success"></ion-icon>
            </ion-card-header>
            <ion-card-content>
              <h2>{{ stats.todaySales | number:'1.0-0' }} Gs.</h2>
              <p>Ventas Hoy</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card class="stat-card">
            <ion-card-header>
              <ion-icon name="stats-chart-outline" color="primary"></ion-icon>
            </ion-card-header>
            <ion-card-content>
              <h2>{{ stats.weekSales | number:'1.0-0' }} Gs.</h2>
              <p>Esta Semana</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card class="stat-card">
            <ion-card-header>
              <ion-icon name="cash-outline" color="tertiary"></ion-icon>
            </ion-card-header>
            <ion-card-content>
              <h2>{{ stats.monthSales | number:'1.0-0' }} Gs.</h2>
              <p>Este Mes</p>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col size="6">
          <ion-card class="stat-card" (click)="goToInvoices()">
            <ion-card-header>
              <ion-icon name="document-text-outline" color="warning"></ion-icon>
            </ion-card-header>
            <ion-card-content>
              <h2>{{ stats.pendingInvoices }}</h2>
              <p>Facturas Pendientes</p>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>

    <!-- Recent Activity -->
    <ion-card>
      <ion-card-header>
        <ion-card-title>Actividad Reciente</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <p class="placeholder-text">No hay actividad reciente</p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
