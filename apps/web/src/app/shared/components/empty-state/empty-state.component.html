<div class="empty-state-container">
  <mat-icon class="empty-icon" [style.color]="iconColor">{{ icon }}</mat-icon>
  <h3 class="empty-title">{{ title }}</h3>
  <p *ngIf="message" class="empty-message">{{ message }}</p>
  <button
    *ngIf="actionLabel"
    mat-raised-button
    color="primary"
    (click)="onActionClick()"
    class="empty-action">
    {{ actionLabel }}
  </button>
</div>
